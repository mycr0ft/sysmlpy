name: Release Workflow

on:
  push:
    branches:
      - main

permissions: write-all

jobs:
  documentation:
    name: Build MkDocs Documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: pip install -r docs/requirements.txt
    - name: Build site
      run: mkdocs build
    - id: deployment
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site

  codecoverage:
    name: Determine code and documentation coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade setuptools
        pip install -r requirements.txt
    - name: Test ${{ github.event.push.head }} coverage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pip install coveralls pytest pyyaml
        python -m coverage run --source=src -m pytest tests/ && coverage report
        coveralls

  versioning:
    name: Semantic Versioning
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sysmlpy
    needs: [documentation, codecoverage]
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Python Semantic Release 📦 to PyPI
      id: release
      uses: python-semantic-release/python-semantic-release@v8.0.3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        repository_username: __token__
        repository_password: ${{ secrets.PYPI_API_TOKEN }}
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      if: ${{ steps.release.outputs.released }} == 'true'
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
    - name: Publish package to GitHub Release
      uses: python-semantic-release/upload-to-gh-release@main
      if: ${{ steps.release.outputs.released }} == 'true'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.release.outputs.tag }}
