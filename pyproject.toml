[build-system]
#requires = ["setuptools>=61.0"]
#build-backend = "setuptools.build_meta"
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[project]
name = "sysmlpy"
version = "0.28.0"
description = "SysML v2.0 Parser"
authors = [
  { name="Jon R. Fox (mycr0ft)", email="jon.fox@drfox.com" },
]
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.7"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
"Homepage" = "https://github.com/mycr0ft/sysmlpy"
"Bug Tracker" = "https://github.com/mycr0ft/sysmlpy/issues"



[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src/sysmlpy", "src"]

[tool.setuptools.package-data]
grammar = ["*.tx"]
"sysmlpy" = [
    "library/**/*.sysml",
    "library/**/*.kerml",
    "library/LICENSE",
]


[tool.pytest.ini_options]
pythonpath = [
  "src"
]
markers = [
    "conformance: SysML v2 Pilot Implementation 2026-03 parse conformance tests (deselect with '-m not conformance')",
]


[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version",
    "pyproject.toml:tool.poetry.version",
]
commit_parser = "emoji"
build_command = "pip install poetry && poetry build"
commit_message = ":bookmark: {version}\n\nAutomatically generated by python-semantic-release"

# Force semantic-release to use tag-based versioning, not commit history
tag_format = "v{version}"
major_on_zero = false
allow_zero_version = true

[tool.semantic_release.changelog]
exclude_commit_patterns = [":robot:",":twisted_rightwards_arrows:",
":poop:", "^[^:].*"]

[tool.semantic_release.commit_parser_options]
major_tags = [":boom:"]
minor_tags = [
    ":sparkles:",
    ":children_crossing:",
    ":lipstick:",
    ":iphone:",
    ":egg:",
    ":chart_with_upwards_trend:",
]
patch_tags = [
    ":ambulance:",
    ":lock:",
    ":bug:",
    ":zap:",
    ":goal_net:",
    ":alien:",
    ":wheelchair:",
    ":speech_balloon:",
    ":mag:",
    ":apple:",
    ":penguin:",
    ":checkered_flag:",
    ":robot:",
    ":green_apple:",
    ":memo:",
    ":heavy_plus_sign:",
    ":construction:",
    ":white_check_mark:",
]

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease = false
build_command = "pip install poetry && poetry build"

[tool.semantic_release.branches."dev0.5.x"]
match = "dev0.5.x"
prerelease = true
prerelease_token = "rc"
build_command = "pip install poetry && poetry build"


[tool.poetry]
name = "sysmlpy"
version = "0.28.0"
description = ""
authors = ["Jon R. Fox (mycr0ft) <jon.fox@drfox.com>"]
readme = "README.md"
packages = [{ include = "sysmlpy", from = "src" }]

[tool.poetry.dependencies]
python = "^3.9"
pint = ">=0.24"
pyyaml = ">=6.0"
antlr4-python3-runtime = ">=4.13"
networkx = { version = ">=3.0", optional = true }
kuzu = { version = ">=0.7,<0.12", optional = true }

[tool.poetry.extras]
graph = ["networkx"]
kuzu = ["kuzu"]

[tool.poetry.scripts]
sysmlpy = "sysmlpy.__main__:main"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0,<9.0"

